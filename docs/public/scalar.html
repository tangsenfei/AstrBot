<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AstrBot OpenAPI - Scalar</title>
    <style>
      html,
      body,
      #app {
        height: 100%;

      })
    </script>
  </body>
